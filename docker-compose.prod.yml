services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: capytrace
      POSTGRES_PASSWORD: capytrace
      POSTGRES_DB: capytrace
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U capytrace']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - capytrace-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - capytrace-network

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - '6333:6333'
    restart: unless-stopped
    networks:
      - capytrace-network

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - '11434:11434'
    restart: unless-stopped
    networks:
      - capytrace-network

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    env_file: .env
    ports:
      - '${API_PORT:-3000}:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - capytrace-network

  ui:
    build:
      context: packages/ui
      dockerfile: Dockerfile
    ports:
      - '${UI_PORT:-5173}:80'
    restart: unless-stopped
    networks:
      - capytrace-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:

networks:
  capytrace-network:
    driver: bridge
