# Memory limits are set conservatively for a typical dev machine with 8–16 GB RAM.
# Adjust the values below based on your available resources:
#   - ollama: increase to 8G+ if you use large models (e.g. llama3:70b)
#   - qdrant: increase proportionally to the number of indexed documents
#   - redis/postgres: 512M is plenty for most workloads

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: capytrace
      POSTGRES_PASSWORD: capytrace
      POSTGRES_DB: capytrace
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U capytrace']
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - '6333:6333'
      - '6334:6334'
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  ollama:
    image: ollama/ollama:latest
    environment:
      # Limit concurrent model inferences to avoid OOM when multiple requests arrive
      # at the same time. Increase if you have more RAM / GPU VRAM available.
      OLLAMA_NUM_PARALLEL: '2'
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - '11434:11434'
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  ollama_data:
